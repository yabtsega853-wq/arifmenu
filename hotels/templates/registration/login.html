{% extends 'hotels/base.html' %}
{% load crispy_forms_tags %}
{% block title %}Owner Login{% endblock %}

{% block extra_css %}
<style>
    .auth-wrap {
        max-width: 440px;
        margin: 2.5rem auto;
    }

    .auth-card {
        border-radius: 16px;
        overflow: hidden;
        box-shadow: 0 4px 24px rgba(26, 10, 0, 0.1);
        border: 1px solid var(--border-warm);
    }

    .auth-header {
        background: linear-gradient(135deg, var(--espresso), #3B1500);
        padding: 1.6rem 2rem;
        border-bottom: 3px solid var(--saffron);
    }

    .auth-header .eyebrow {
        font-size: 0.7rem;
        font-weight: 700;
        letter-spacing: 1.8px;
        text-transform: uppercase;
        color: var(--saffron);
        margin-bottom: 0.3rem;
    }

    .auth-header h3 {
        font-family: 'Playfair Display', serif;
        color: #fff;
        font-size: 1.4rem;
        margin: 0;
    }

    .auth-body {
        padding: 2rem;
        background: #fff;
    }

    .auth-body .btn-forest {
        width: 100%;
        padding: 0.75rem;
        font-size: 1rem;
        margin-top: 0.4rem;
    }

    .auth-footer-text {
        text-align: center;
        font-size: 0.875rem;
        color: var(--text-muted-custom);
        margin-top: 1.2rem;
    }

    .auth-footer-text a {
        color: var(--forest);
        font-weight: 600;
        text-decoration: none;
    }

    .auth-footer-text a:hover {
        text-decoration: underline;
    }

    .auth-body label {
        font-weight: 600;
        font-size: 0.875rem;
        color: var(--espresso);
    }

    .auth-body .form-control {
        border: 1.5px solid var(--border-warm);
        border-radius: 8px;
        font-size: 0.9rem;
        padding: 0.55rem 0.85rem;
    }

    .auth-body .form-control:focus {
        border-color: var(--forest);
        box-shadow: 0 0 0 3px rgba(29, 107, 68, 0.12);
        outline: none;
    }
</style>
{% endblock %}

{% block content %}
<div class="auth-wrap">
    <div class="auth-card">
        <div class="auth-header">
            <p class="eyebrow">AddisMenu</p>
            <h3>Hotel Owner Login</h3>
        </div>
        <div class="auth-body">
            <form method="post">
                {% csrf_token %}
                {{ form|crispy }}
                <button type="submit" class="btn btn-forest">Sign In →</button>
            </form>
            <p class="auth-footer-text">Don't have an account? <a href="{% url 'register' %}">Register your hotel</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}
