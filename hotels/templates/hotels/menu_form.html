{% extends 'hotels/base.html' %}
{% load crispy_forms_tags %}
{% block title %}{{ title }}{% endblock %}

{% block extra_css %}
<style>
    .form-card {
        max-width: 600px;
        margin: 0 auto;
        border-radius: 16px;
        box-shadow: 0 4px 24px rgba(26, 10, 0, 0.1);
        overflow: hidden;
        border: 1px solid var(--border-warm);
    }

    .form-card-header {
        background: linear-gradient(135deg, var(--espresso), #3B1500);
        padding: 1.6rem 2rem;
        border-bottom: 3px solid var(--saffron);
    }

    .form-card-header h3 {
        font-family: 'Playfair Display', serif;
        color: #fff;
        font-size: 1.4rem;
        margin: 0;
    }

    .form-card-body {
        padding: 2rem;
        background: #fff;
    }

    .form-card-body .btn-forest {
        width: 100%;
        padding: 0.75rem;
        font-size: 1rem;
        margin-top: 0.5rem;
    }

    .form-cancel-link {
        display: block;
        text-align: center;
        margin-top: 0.75rem;
        font-size: 0.875rem;
        color: var(--text-muted-custom);
        text-decoration: none;
        transition: color 0.18s;
    }

    .form-cancel-link:hover {
        color: var(--espresso);
    }

    /* Crispy form overrides */
    .form-card-body label {
        font-weight: 600;
        font-size: 0.875rem;
        color: var(--espresso);
        margin-bottom: 0.3rem;
    }

    .form-card-body .form-control,
    .form-card-body .form-select {
        border: 1.5px solid var(--border-warm);
        border-radius: 8px;
        font-size: 0.9rem;
        padding: 0.55rem 0.85rem;
        transition: border-color 0.18s, box-shadow 0.18s;
    }

    .form-card-body .form-control:focus,
    .form-card-body .form-select:focus {
        border-color: var(--forest);
        box-shadow: 0 0 0 3px rgba(29, 107, 68, 0.12);
        outline: none;
    }
</style>
{% endblock %}

{% block content %}
<div class="form-card">
    <div class="form-card-header">
        <h3>{{ title }}</h3>
    </div>
    <div class="form-card-body">
        <form method="post" enctype="multipart/form-data">
            {% csrf_token %}
            {{ form|crispy }}
            <button type="submit" class="btn btn-forest">Save Item</button>
        </form>
        <a href="{% url 'dashboard' %}" class="form-cancel-link">← Cancel and return to Dashboard</a>
    </div>
</div>
{% endblock %}
