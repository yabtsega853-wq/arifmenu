services:
  - type: web
    name: addismenu
    runtime: python
    buildCommand: "./build.sh"
    startCommand: "gunicorn addismenu.wsgi:application"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: addismenu_db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: false